# Builds a customized Debian LXC template from scratch using debootstrap
# against Debian's official HTTPS mirror, instead of pulling any prebuilt
# template from Proxmox's HTTP-only server.
#
# Flow:
#   1. debootstrap a minimal rootfs for _DEBIAN_RELEASE directly from
#      deb.debian.org (HTTPS, apt signature-verified) -> plain rootfs tar
#   2. `docker import` it into a throwaway image
#   3. Run a container from it: apt-get update/upgrade, install packages, clean up
#   4. `docker export` the container's filesystem back to a plain tar
#   5. Recompress with zstd
#   6. Upload the finished template to GCS
#
# Trigger with:
#   DISTRO=debian ./submit-build.sh
# (reads shared settings from build.env and Debian-specific settings from
# debian.env), or directly:
#   gcloud builds submit --config=cloudbuild-debian.yaml --no-source \
#     --substitutions=_PACKAGES="htop",_BUCKET="gs://your-bucket",_DEBIAN_RELEASE="trixie"

timeout: 1200s

substitutions:
  _PACKAGES: "htop"
  _BUCKET: "gs://CHANGE_ME"
  _DEBIAN_RELEASE: "trixie"

steps:
  # 1. Build a fresh minimal rootfs with debootstrap (runs in a sibling
  #    container with --cap-add=SYS_ADMIN so it can bind-mount /proc for
  #    package postinst scripts during the second stage)
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        mkdir -p /workspace/rootfs-dir
        docker run --rm --cap-add=SYS_ADMIN -v /workspace:/workspace debian:stable-slim bash -c "
          apt-get update &&
          apt-get install -y --no-install-recommends debootstrap ca-certificates &&
          debootstrap --variant=minbase --include=ifupdown,isc-dhcp-client,systemd-sysv,dialog ${_DEBIAN_RELEASE} /workspace/rootfs-dir https://deb.debian.org/debian &&
          rm -rf /workspace/rootfs-dir/dev/* &&
          tar --numeric-owner -C /workspace/rootfs-dir -cf /workspace/rootfs.tar .
        "

  # 2. Import as docker image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker import /workspace/rootfs.tar debian-base:build']

  # 3. Customize: update + install packages + run custom build script + clean up
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker run --name debian-build \
          -v /workspace/scripts/debian.sh:/custom-build.sh:ro \
          debian-base:build sh -c "
          printf '#!/bin/sh\nexit 101\n' > /usr/sbin/policy-rc.d &&
          chmod +x /usr/sbin/policy-rc.d &&
          export DEBIAN_FRONTEND=noninteractive &&
          apt-get update &&
          apt-get -y upgrade &&
          apt-get -y install --no-install-recommends ${_PACKAGES} &&
          bash /custom-build.sh &&
          apt-get -y autoremove &&
          apt-get clean &&
          rm -rf /var/lib/apt/lists/* /var/cache/apt/archives/*.deb /tmp/* /var/tmp/* &&
          rm -f /etc/machine-id &&
          rm -f /usr/sbin/policy-rc.d
        "

  # 4. Export filesystem back to plain tar
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker export debian-build -o /workspace/rootfs-new.tar
        docker rm debian-build

  # 5. Recompress with zstd
  - name: 'alpine:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache zstd
        zstd -19 -T0 /workspace/rootfs-new.tar \
          -o /workspace/debian-custom_$(date +%Y%m%d)-1_amd64.tar.zst

  # 6. Upload result
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args: ['-c', 'gsutil cp /workspace/debian-custom_*.tar.zst ${_BUCKET}/custom/']

options:
  machineType: 'E2_HIGHCPU_8'
