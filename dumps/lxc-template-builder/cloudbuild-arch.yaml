# Builds a customized Arch Linux LXC template from the official upstream
# Arch bootstrap tarball (GPG-verified, HTTPS) instead of Proxmox's
# HTTP-only, unsigned copy.
#
# Flow:
#   1. Fetch the bootstrap tarball + signature from an official Arch mirror,
#      verify against Pierre Schmitz's release-signing key (fetched via WKD)
#   2. Decompress zstd, strip the "root.x86_64/" wrapper dir -> plain rootfs tar
#   3. `docker import` it into a throwaway image
#   4. Run a container from it: pacman -Syu, install packages, clean up
#   5. `docker export` the container's filesystem back to a plain tar
#   6. Recompress with zstd
#   7. Upload the finished template to GCS
#
# Trigger with:
#   DISTRO=arch ./submit-build.sh
# (reads shared settings from build.env and Arch-specific settings from
# arch.env), or directly:
#   gcloud builds submit --config=cloudbuild-arch.yaml --no-source \
#     --substitutions=_PACKAGES="htop",_BUCKET="gs://your-bucket",_BASE_IMAGE="archlinux-bootstrap-x86_64.tar.zst"

timeout: 1200s

substitutions:
  _PACKAGES: "htop"
  _BUCKET: "gs://CHANGE_ME"
  _BASE_IMAGE: "archlinux-bootstrap-x86_64.tar.zst"
  _MIRROR: "https://geo.mirror.pkgbuild.com/iso/latest"

steps:
  # 1. Fetch bootstrap tarball + signature, verify PGP signature
  - name: 'alpine:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache curl gnupg
        curl -fSL "${_MIRROR}/${_BASE_IMAGE}" -o /workspace/src.tar.zst
        curl -fSL "${_MIRROR}/${_BASE_IMAGE}.sig" -o /workspace/src.tar.zst.sig
        gpg --auto-key-locate clear,wkd -v --locate-external-key pierre@archlinux.org
        gpg --verify /workspace/src.tar.zst.sig /workspace/src.tar.zst

  # 2. Decompress and strip the "root.x86_64/" wrapper dir the bootstrap
  #    tarball ships with, producing a flat rootfs tar like Proxmox's format
  - name: 'alpine:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache zstd tar
        zstd -d /workspace/src.tar.zst -o /workspace/bootstrap.tar
        mkdir -p /workspace/rootfs-dir
        tar -xf /workspace/bootstrap.tar -C /workspace/rootfs-dir --strip-components=1
        tar --numeric-owner -C /workspace/rootfs-dir -cf /workspace/rootfs.tar .

  # 3. Import as docker image
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args: ['-c', 'docker import /workspace/rootfs.tar arch-base:build']

  # 4. Customize: update + install packages + run custom build script + clean up
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker run --name arch-build \
          -v /workspace/scripts/arch.sh:/custom-build.sh:ro \
          arch-base:build sh -c "
          sed -i '/^\[options\]/a DisableSandbox' /etc/pacman.conf &&
          echo 'Server = https://geo.mirror.pkgbuild.com/\$repo/os/\$arch' > /etc/pacman.d/mirrorlist &&
          pacman-key --init &&
          pacman-key --populate archlinux &&
          pacman -Syu --noconfirm &&
          pacman -S --noconfirm ${_PACKAGES} &&
          bash /custom-build.sh &&
          systemctl enable console-getty.service &&
          systemctl mask systemd-firstboot.service &&
          pacman -Scc --noconfirm &&
          rm -rf /var/cache/pacman/pkg/* /tmp/* /var/tmp/* &&
          rm -f /etc/machine-id
        "

  # 5. Export filesystem back to plain tar
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        docker export arch-build -o /workspace/rootfs-new.tar
        docker rm arch-build

  # 6. Recompress with zstd
  - name: 'alpine:latest'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        apk add --no-cache zstd
        zstd -19 -T0 /workspace/rootfs-new.tar \
          -o /workspace/archlinux-custom_$(date +%Y%m%d)-1_amd64.tar.zst

  # 7. Upload result
  - name: 'gcr.io/cloud-builders/gsutil'
    entrypoint: 'bash'
    args: ['-c', 'gsutil cp /workspace/archlinux-custom_*.tar.zst ${_BUCKET}/custom/']

options:
  machineType: 'E2_HIGHCPU_8'
